{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center mt-4">
  <div class="col-md-5">

    <!-- Header -->
    <div class="text-center mb-4">
      <div style="font-size:4rem;">👁️</div>
      <h2 style="font-weight:700; color:#667eea;">Welcome Back!</h2>
      <p class="text-muted">Login to your ProctorEye account</p>
    </div>

    <!-- Card -->
    <div class="card p-4">
      {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
      {% endif %}

      <form method="POST" action="/login">
        <div class="mb-3">
          <label class="form-label fw-600">
            <i class="fa fa-id-badge me-2 text-primary"></i>Student ID
          </label>
          <input type="text" name="student_id" class="form-control form-control-lg"
                 placeholder="e.g. CB001" required
                 style="border-radius:12px; border:2px solid #e0e7ff;"/>
        </div>

        <div class="mb-3">
          <label class="form-label fw-600">
            <i class="fa fa-user me-2 text-primary"></i>Full Name
          </label>
          <input type="text" name="name" class="form-control form-control-lg"
                 placeholder="Enter your full name" required
                 style="border-radius:12px; border:2px solid #e0e7ff;"/>
        </div>

        <div class="mb-4">
          <label class="form-label fw-600">
            <i class="fa fa-lock me-2 text-primary"></i>Password
          </label>
          <input type="password" name="password" class="form-control form-control-lg"
                 placeholder="Enter your password" required
                 style="border-radius:12px; border:2px solid #e0e7ff;"/>
        </div>

        <button type="submit" class="btn btn-primary w-100 btn-lg">
          <i class="fa fa-sign-in-alt me-2"></i>Login
        </button>
      </form>

      <hr class="my-4"/>

      <p class="text-center text-muted mb-0">
        New student?
        <a href="/signup" style="color:#667eea; font-weight:600;">Create Account</a>
      </p>
    </div>

    <!-- Demo credentials hint -->
    <div class="card mt-3 p-3" style="background:#f8f0ff; border-left: 4px solid #667eea;">
      <p class="mb-1 fw-bold text-purple" style="color:#667eea;">
        <i class="fa fa-info-circle me-2"></i>Demo Credentials
      </p>
      <small class="text-muted">
        ID: <b>CB001</b> &nbsp;|&nbsp; Name: <b>Nandini Reddy</b> &nbsp;|&nbsp; Password: <b>nandini123</b>
      </small>
    </div>

  </div>
</div>

{% endblock %}
